.bottom-bar{
position:fixed;

}

.bottom-bar button{
all:unset;

align-items:center;
justify-content:center;
cursor:pointer;
}

.bottom-bar img{
width:26px;
height:26px;
opacity:0.9;
transition:0.25s;
background:transparent;
filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
}

.bottom-bar button:hover img{
opacity:1;
transform:scale(1.2);
filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
}

.content-area{
width:100%;
height:100vh;
}

.content-area iframe{
width:100%;
height:100%;

}
