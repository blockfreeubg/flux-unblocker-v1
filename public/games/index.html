<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --border:         #ebdf3e;
    --text:           #ffffff;
    --text-dim:       #e5e9f0;
    --text-muted:     #d8dee9;
    --accent:         #f5dc51;
  }

.bottom-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(20,20,20,0.6);
  backdrop-filter:blur(15px);
  border-radius:30px;
  padding:12px 30px;
  display:flex;
  gap:35px;
  align-items:center;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  z-index: 9999;
}

.bottom-bar button{
background:none;
border:none;
cursor:pointer;
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
}

.bottom-bar svg{
width:26px;
height:26px;
fill:white;
opacity:0.9;
transition:0.25s;
filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
}

.bottom-bar button:hover svg{
opacity:1;
transform:scale(1.2);
filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
}

  body { background: var(--bg); color: var(--text); font-family: 'Readex Pro', sans-serif; }

  .top-bar, .grid, .section {
    position: relative;
    z-index: 1;
  }
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px; background: var(--bg-deep); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .top-bar h1 { font-size: 18px; font-weight: 700; margin-right: auto; }
  .top-bar input {
    padding: 8px 14px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; width: 220px; outline: none;
  }
  .top-bar input::placeholder { color: var(--text-muted); }
  .top-bar input:focus { border-color: var(--accent); }

  #source {
    padding: 8px 14px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; outline: none;
    font-family: inherit;
  }
  #source:focus { border-color: var(--accent); }

  #grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 16px; padding: 24px;
    position: relative; z-index: 1;
  }

  .card {
    border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: transform .15s;
    text-decoration: none; color: inherit;
    border: 2px solid var(--border);
    position: relative;
  }
  .card:hover { transform: translateY(-4px) scale(1.05); }
  .card img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--bg);
  }
  .card span {
    display: block; padding: 10px 12px; font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fav-btn {
    position: absolute; top: 6px; right: 6px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(0,0,0,.55); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s;
    z-index: 2; padding: 0;
  }

  html, body {
  height: auto;
  overflow-y: auto;
}
  .card:hover .fav-btn { opacity: 1; }
  .fav-btn.active { opacity: 1; }
  .fav-btn i { font-size: 14px; color: #eceff4; }
  .fav-btn.active i { color: #ebcb8b; }

  #count { font-size: 13px; color: var(--text-muted); }

  html { scroll-behavior: auto; }
  
  body {
    position: relative;
  }
</style>

<div class="top-bar">
  <img src="../logo2.png" alt="Flux Logo" style="height:48px; object-fit:contain;">
  <h1>Flux | Games</h1>
  <span id="count"></span>
  <input type="text" id="search" placeholder="Search games..." oninput="filterGames()">
  <select id="source" onchange="load(this.value)">
    <option value="games.json">All Games</option>
    <option value="__favorites__">Favorites</option>
  </select>
</div>

<div id="grid"></div>

<script>
  
  let allGames = [];

  function getFavs() {
    try { return JSON.parse(localStorage.getItem('fav-games') || '[]'); } catch { return []; }
  }
  function setFavs(favs) { localStorage.setItem('fav-games', JSON.stringify(favs)); }
  function isFav(name) { return getFavs().includes(name); }
  function toggleFav(name) {
    let favs = getFavs();
    if (favs.includes(name)) favs = favs.filter(f => f !== name);
    else favs.push(name);
    setFavs(favs);
  }

  async function load(file) {
    if (file === '__favorites__') {
      try {
        const res = await fetch('games.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const all = Array.isArray(data) ? data : (data.games || []);
        const favs = getFavs();
        allGames = all.filter(g => favs.includes(g.name));
      } catch (e) {
        allGames = [];
      }
      document.getElementById('search').value = '';
      renderGames(allGames);
      return;
    }

    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allGames = Array.isArray(data) ? data : (data.games || []);
    } catch (e) {
      allGames = [];
      console.error('Failed to load', file, e);
      document.getElementById('grid').innerHTML =
        '<p style="padding:24px;color:#bf616a;grid-column:1/-1;">Failed to load <b>' + file + '</b>: ' + e.message + '</p>';
      document.getElementById('count').textContent = '0 games';
      return;
    }
    document.getElementById('search').value = '';
    renderGames(allGames);
  }

  function filterGames() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allGames.filter(g => g.name.toLowerCase().includes(q));
    renderGames(filtered);
  }

  function starIcon(active) { return `<i class="fa-${active ? 'solid' : 'regular'} fa-star"></i>`; }

  function renderGames(games) {
    const grid = document.getElementById('grid');
    document.getElementById('count').textContent = games.length + ' games';
    grid.innerHTML = games.map(g => {
      const href = 'frame.html?url=' + encodeURIComponent(g.url);
      const active = isFav(g.name) ? ' active' : '';
      const fav = isFav(g.name);
      return `<a class="card" href="${href}">
        <button class="fav-btn${fav ? ' active' : ''}" data-name="${g.name.replace(/"/g, '&quot;')}" title="Toggle favorite">${starIcon(fav)}</button>
        <img src="${g.thumbnail}" alt="${g.name}" loading="lazy" onerror="this.style.display='none'">
        <span>${g.name}</span>
      </a>`;
    }).join('');
  }

  document.getElementById('grid').addEventListener('click', function(e) {
    const btn = e.target.closest('.fav-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    toggleFav(btn.dataset.name);
    btn.classList.toggle('active');
    const nowActive = btn.classList.contains('active');
    btn.innerHTML = starIcon(nowActive);
  });

  const hoverAudio = new Audio('hover.wav');
  hoverAudio.volume = 0.3;
  document.getElementById('grid').addEventListener('mouseover', function(e) {
    const card = e.target.closest('.card');
    if (card && localStorage.getItem('hover-sound') === 'on') {
      hoverAudio.currentTime = 0;
      hoverAudio.play().catch(() => {});
    }
  });

  load('games.json');

  // ido lenis after it loads
  window.addEventListener('DOMContentLoaded', function() {
    if (typeof Lenis !== 'undefined') {
      var lenis = new Lenis({ lerp: 0.06, smoothWheel: true }); // the smooth scrolling library from the gta 6 website btw
      function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
    }
  });
</script>
