<!doctype html>
<html>
  <head>
    <meta name="google-adsense-account" content="ca-pub-7990685115274766">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Flux</title>
    <link rel="shortcut icon" content="favicon.webp" />
 
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
 
    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
 
    <style>
      #dynamic-island {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%) scale(0.5);
        background: #1a1a1a;
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 0;
        width: 48px;
        height: 34px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        z-index: 9999;
        box-shadow: 0 0 0 1.5px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.7);
        transition:
          width 0.45s cubic-bezier(0.34, 1.26, 0.64, 1),
          height 0.45s cubic-bezier(0.34, 1.26, 0.64, 1),
          border-radius 0.45s cubic-bezier(0.34, 1.26, 0.64, 1),
          transform 0.45s cubic-bezier(0.34, 1.26, 0.64, 1),
          opacity 0.2s ease,
          padding 0.35s ease;
      }
      #dynamic-island.open {
        width: min(560px, 92vw);
        height: 52px;
        border-radius: 30px;
        padding: 0 10px 0 12px;
        opacity: 1;
        pointer-events: all;
        transform: translateX(-50%) scale(1);
      }
 
      #island-content {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 2px;
        opacity: 0;
        transition: opacity 0.15s ease 0.28s;
      }
      #dynamic-island.open #island-content {
        opacity: 1;
      }
 
      .island-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: rgba(255,255,255,0.7);
        padding: 6px 7px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s, color 0.15s;
      }
      .island-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
      .island-btn:active { background: rgba(255,255,255,0.18); }
      .island-btn:disabled { opacity: 0.22; cursor: default; pointer-events: none; }
      .island-btn svg {
        width: 16px; height: 16px;
        fill: none; stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round; stroke-linejoin: round;
      }
 
      .island-divider {
        width: 1px; height: 20px;
        background: rgba(255,255,255,0.12);
        margin: 0 3px;
        flex-shrink: 0;
      }
		
      #sj-address.in-island {
        flex: 1;
        background: rgba(255,255,255,0.09) !important;
        border: 1px solid rgba(255,255,255,0.13) !important;
        border-radius: 20px !important;
        color: #fff !important;
        font-size: 13px !important;
        padding: 5px 14px !important;
        height: 34px !important;
        min-width: 0;
        margin: 0 5px;
        outline: none;
        transition: background 0.2s, border-color 0.2s;
      }
      #sj-address.in-island:focus {
        background: rgba(255,255,255,0.14) !important;
        border-color: rgba(255,255,255,0.28) !important;
      }
      #sj-address.in-island::placeholder { color: rgba(255,255,255,0.35); }
 
      #island-close {
        background: none;
        border: none;
        cursor: pointer;
        color: rgba(255,255,255,0.45);
        font-size: 17px;
        line-height: 1;
        padding: 6px 7px;
        border-radius: 10px;
        flex-shrink: 0;
        transition: background 0.15s, color 0.15s;
      }
      #island-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
 
      #reload-spin { display: inline-block; transition: transform 0.45s ease; }
    </style>
  </head>
  <body>

    <div id="dynamic-island">
      <div id="island-content">
        <button class="island-btn" id="btn-back" disabled title="Go back">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="island-btn" id="btn-forward" disabled title="Go forward">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="island-btn" id="btn-reload" title="Reload">
          <svg viewBox="0 0 24 24" id="reload-spin">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
        <div class="island-divider"></div>
        <div id="island-input-slot"></div>
        <div class="island-divider"></div>
        <button id="island-close" title="Close">&#x2715;</button>
      </div>
    </div>
 
    <div title="Scramjet Logo" class="flex-center logo-wrapper header-center">
      <img class="logo" src="logo.png" alt="flux" />
    </div>
    <div class="flex-center desc left-margin">
    </div>
    <form id="sj-form" class="flex-center">
      <input
        id="sj-search-engine"
        value="https://www.google.com/search?q=%s"
        type="hidden"
      />
      <input id="sj-address" type="text" placeholder="Search the web freely" />
    </form>
    <div class="desc left-margin">
      <p id="sj-error"></p>
      <pre id="sj-error-code"></pre>
    </div>
 
    <script>
      (function () {
        const island     = document.getElementById('dynamic-island');
        const form       = document.getElementById('sj-form');
        const input      = document.getElementById('sj-address');
        const slot       = document.getElementById('island-input-slot');
        const btnBack    = document.getElementById('btn-back');
        const btnForward = document.getElementById('btn-forward');
        const btnReload  = document.getElementById('btn-reload');
        const btnClose   = document.getElementById('island-close');
        const reloadIcon = document.getElementById('reload-spin');
 
        let isOpen = false;

        function updateNavBtns() {
          btnBack.disabled    = !window.history.state || window.history.state.idx <= 0;
          btnForward.disabled = !window.history.state || window.history.state.idx >= (window.history.state.total - 1);
        }
 
        function openIsland() {
          if (isOpen) return;
          isOpen = true;
          input.classList.add('in-island');
          slot.appendChild(input);
          island.classList.add('open');
          updateNavBtns();
          // focus after animation
          setTimeout(() => input.focus(), 360);
        }
 
        function closeIsland() {
          if (!isOpen) return;
          isOpen = false;
          island.classList.remove('open');
          setTimeout(() => {
            input.classList.remove('in-island');
            form.insertBefore(input, null);
          }, 300);
        }
 
        form.addEventListener('submit', function (e) {
          const q = input.value.trim();
          if (!q) return;
 
          const idx = (window.history.state && window.history.state.idx != null)
            ? window.history.state.idx + 1 : 0;
          window.history.pushState({ idx }, '', window.location.href);
 
          openIsland();
          updateNavBtns();
        });
 
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            setTimeout(() => {
              if (!isOpen) openIsland();
              updateNavBtns();
            }, 50);
          }
        });
 
        btnBack.addEventListener('click', function () {
          window.history.back();
        });
 
        btnForward.addEventListener('click', function () {
          window.history.forward();
        });

        btnReload.addEventListener('click', function () {
          reloadIcon.style.transform = 'rotate(360deg)';
          setTimeout(() => { reloadIcon.style.transform = ''; }, 460);
          window.location.reload();
        });

        btnClose.addEventListener('click', closeIsland);
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && isOpen) closeIsland();
        });

        window.addEventListener('popstate', function () {
          updateNavBtns();
        });
      })();
    </script>
  </body>
</html>
