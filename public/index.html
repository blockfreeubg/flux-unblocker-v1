.sidebar{

.sidebar a{

align-items:center;

border-radius:10px;
transition:0.2s;

.sidebar a:hover{
background:rgba(255,255,255,0.15);
}

.sidebar span{
font-size:22px;
}


.content-area{
margin-left:90px;
width:calc(100% - 90px);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


.content-area iframe{
width:100%;
height:100%;
border:none;
}
