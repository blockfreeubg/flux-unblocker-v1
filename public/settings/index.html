<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
z-index: 9;
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.bottom-bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(20,20,20,0.6);
backdrop-filter:blur(15px);
border-radius:30px;
padding:12px 30px;
display:flex;
gap:35px;
align-items:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
z-index: 9999;
}

.bottom-bar button{
background:none;
border:none;
cursor:pointer;
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
}

.bottom-bar svg{
width:26px;
height:26px;
fill:white;
opacity:0.9;
transition:0.25s;
filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
}

.bottom-bar button:hover svg{
opacity:1;
transform:scale(1.2);
filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
}

.content-area{
width:100%;
height:100vh;
}

.content-area iframe{
width:100%;
height:100%;
border:none;
}

.settings-panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(20,20,20,0.55); /* more transparent */
backdrop-filter:blur(18px);
padding:125px 40px; /* bigger */
border-radius:30px;
text-align:center;
color:white;
box-shadow:0 0 40px rgba(0,0,0,0.6);
z-index: 1000;
min-width: 400px;
}

.settings-panel h1{
margin:0;
font-size:40px;
}

.settings-panel p{
margin-top:20px;
opacity:0.8;
font-size:18px;
}

.divider{
width:100%;
height:1px;
background:rgba(255,255,255,0.2);
margin:20px 0;
}
</style>
