		<style>
			html,
			body {
				height: 100%;
				margin: 0;
				overflow: hidden;
			}

			body {
				display: flex;
				flex-direction: column;
				background: #111;
			}

			.island-container {
				flex-shrink: 0;
				padding: 16px 0;
				background: rgba(0, 0, 0, 0.82);
				backdrop-filter: blur(10px);
			}

			.app-stage {
				flex: 1;
				min-height: 0;
				position: relative;
			}

			.app-picker {
				max-width: 1100px;
				width: 100%;
				margin: 0 auto;
				padding: 18px 22px 14px;
				box-sizing: border-box;
				height: 100%;
				overflow: auto;
			}

			.apps-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
				gap: 10px;
			}

			.app-card {
				background: rgba(0, 0, 0, 0.72);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 12px;
				padding: 10px;
				cursor: pointer;
				color: #fff;
				text-align: left;
				transition: border-color 0.15s ease, transform 0.15s ease;
			}

			.app-card:hover {
				border-color: rgba(255, 255, 255, 0.35);
				transform: translateY(-2px);
			}

			.app-card.active {
				border-color: rgba(255, 255, 255, 0.7);
			}

			.app-card img {
				width: 100%;
				aspect-ratio: 16 / 9;
				object-fit: cover;
				display: block;
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.08);
			}

			.app-card strong {
				display: block;
				margin-top: 8px;
				font-size: 0.92rem;
			}

			.app-card span {
				display: block;
				margin-top: 2px;
				font-size: 0.78rem;
				color: rgba(255, 255, 255, 0.75);
			}

			.embedded-area {
				position: absolute;
				inset: 0;
			}

			.embedded-area[hidden] {
				display: none;
			}

			#app-frame {
				width: 100%;
				height: 100%;
				border: 0;
				background: #0e0e0e;
				display: block;
			}

			.loading-overlay {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				gap: 12px;
				background: rgba(8, 8, 8, 0.9);
				backdrop-filter: blur(6px);
				z-index: 3000;
				color: #fff;
				font-size: 0.95rem;
			}

			.loading-overlay.active {
				display: flex;
			}

			.loader-ring {
				width: 42px;
				height: 42px;
				border-radius: 50%;
				border: 3px solid rgba(255, 255, 255, 0.25);
				border-top-color: #fff;
				animation: spin 0.75s linear infinite;
			}

			.loading-seconds {
				font-size: 0.85rem;
				color: rgba(255, 255, 255, 0.75);
			}

			.loading-tip {
				max-width: 360px;
				text-align: center;
				font-size: 0.82rem;
				color: rgba(255, 255, 255, 0.82);
				padding: 0 14px;
				line-height: 1.4;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes move {
    100% {
        transform: translate3d(0, 0, 1px) rotate(360deg);
    }
}

		<script>
			const apps = [
				{ key: "google", name: "Google", site: "https://google.com", label: "google.com" },
				{ key: "twitter", name: "Twitter", site: "https://twitter.com", label: "twitter.com" },
				{ key: "instagram", name: "Instagram", site: "https://instagram.com", label: "instagram.com" },
				{ key: "youtube", name: "YouTube", site: "https://youtube.com", label: "youtube.com" },
				{ key: "spotify", name: "Spotify", site: "https://spotify.com", label: "spotify.com" },
				{ key: "discord", name: "Discord", site: "https://discord.com", label: "discord.com" },
				{ key: "reddit", name: "Reddit", site: "https://reddit.com", label: "reddit.com" },
				{ key: "geforcenow", name: "GeForce NOW", site: "https://play.geforcenow.com/", label: "play.geforcenow.com" },
				{ key: "chatgpt", name: "ChatGPT", site: "https://chatgpt.com/", label: "chatgpt.com" },
				{ key: "tiktok", name: "Tiktok", site: "https://tiktok.com", label: "tiktok.com" }
			];

			const grid = document.getElementById("apps-grid");
			const appPicker = document.getElementById("app-picker");
			const embeddedArea = document.getElementById("embedded-area");
			const appFrame = document.getElementById("app-frame");
			const loadingOverlay = document.getElementById("loading-overlay");
			const loadingText = document.getElementById("loading-text");
			const loadingSeconds = document.getElementById("loading-seconds");
			const loadingTip = document.getElementById("loading-tip");

			const loadingTips = [
				"Tip: first load can take a few seconds.",
				"Tip: keep this tab open while the app initializes.",
				"Tip: slower networks may take longer to connect.",
				"Tip: if a site fails, click it again from the app list."
			];

			let activeTimer;
			let activeTipTimer;
			let activeCard;

			const placeholderFor = (name) => {
				const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#1f2937"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs><rect width="640" height="360" fill="url(#g)"/><circle cx="70" cy="70" r="24" fill="#4b5563"/><rect x="110" y="52" width="230" height="38" rx="8" fill="#374151"/><rect x="42" y="300" width="556" height="24" rx="8" fill="#374151"/><text x="50%" y="55%" fill="#f9fafb" font-size="38" font-family="Roboto, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle">${name}</text></svg>`;
				return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
			};

			const stopLoading = () => {
				if (activeTimer) clearInterval(activeTimer);
				if (activeTipTimer) clearInterval(activeTipTimer);
				activeTimer = undefined;
				activeTipTimer = undefined;
				loadingOverlay.classList.remove("active");
				loadingOverlay.setAttribute("aria-hidden", "true");
			};

			const startLoading = (name) => {
				stopLoading();
				loadingText.textContent = `Opening ${name}...`;
				loadingSeconds.textContent = "0.0s elapsed";
				loadingTip.textContent = loadingTips[0];
				loadingOverlay.classList.add("active");
				loadingOverlay.setAttribute("aria-hidden", "false");

				const start = Date.now();
				let tipIndex = 0;
				activeTimer = setInterval(() => {
					const elapsed = ((Date.now() - start) / 1000).toFixed(1);
					loadingSeconds.textContent = `${elapsed}s elapsed`;
				}, 100);
				activeTipTimer = setInterval(() => {
					tipIndex = (tipIndex + 1) % loadingTips.length;
					loadingTip.textContent = loadingTips[tipIndex];
				}, 1600);
			};

			appFrame.addEventListener("load", () => {
				stopLoading();
			});

			if (typeof registerSW === "function") {
				registerSW().catch(() => {});
			}

			apps.forEach((app) => {
				const card = document.createElement("button");
				card.type = "button";
				card.className = "app-card";
				card.innerHTML = `<img src="${placeholderFor(app.name)}" alt="${app.name} placeholder image" /><strong>${app.name}</strong><span>${app.label}</span>`;
				card.setAttribute("aria-label", `Open ${app.name}`);
				card.addEventListener("click", () => {
					if (activeCard) activeCard.classList.remove("active");
					card.classList.add("active");
					activeCard = card;

					startLoading(app.name);
					appPicker.hidden = true;
					embeddedArea.hidden = false;

					const proxyUrl = `${window.location.origin}/proxy.html?url=${encodeURIComponent(app.site)}&t=${Date.now()}`;
					appFrame.src = proxyUrl;
				});
				grid.appendChild(card);
			});
