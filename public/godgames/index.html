.background{

left:0;

height:100%;

.sidebar{
position:fixed;
left:0;
top:0;

display:flex;
flex-direction:column;
align-items:center;

gap:28px;
}


.sidebar a{
text-decoration:none;
color:rgb(255, 255, 255);
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
padding:10px;
border-radius:10px;
transition:0.2s;
}

.sidebar a:hover{

}

.sidebar span{
font-size:22px;
}

.sidebar img{
width: 95px;

.content-area{
margin-left:90px;

display:flex;
justify-content:center;

}


.content-area iframe{
width:100%;
height:100%;
border:none;
}

    100% {
        transform: translate3d(0, 0, 1px) rotate(360deg);
