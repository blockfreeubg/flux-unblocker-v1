<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.bottom-bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(20,20,20,0.6);
backdrop-filter:blur(15px);
border-radius:30px;
padding:12px 30px;
display:flex;
gap:35px;
align-items:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
z-index: 9999;
}

.bottom-bar button{
background:none;
border:none;
cursor:pointer;
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
}

.bottom-bar svg{
width:26px;
height:26px;
fill:white;
opacity:0.9;
transition:0.25s;
filter: drop-shadow(0 0 4px rgba(255,255,255,0.2));
}

.bottom-bar button:hover svg{
opacity:1;
transform:scale(1.2);
filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
}

.content-area{
width:100%;
height:100vh;
}

.content-area iframe{
width:100%;
height:100%;
border:none;
}
</style>
