<!doctype html>
<html>
	<head>
		<meta name="google-adsense-account" content="ca-pub-7990685115274766">
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Flux</title>

		<link rel="shortcut icon" content="favicon.webp" />
		
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		
		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
		<style>
			#dynamic-island {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%) scaleX(0.4) scaleY(0.5);
  background: #1a1a1a;
  border-radius: 50px;
  display: flex;
  align-items: center;
  padding: 0;
  width: 48px;
  height: 34px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  box-shadow: 0 0 0 1.5px rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.7);
  transition:
    width 0.45s cubic-bezier(0.34,1.26,0.64,1),
    height 0.45s cubic-bezier(0.34,1.26,0.64,1),
    border-radius 0.45s cubic-bezier(0.34,1.26,0.64,1),
    transform 0.45s cubic-bezier(0.34,1.26,0.64,1),
    opacity 0.25s ease,
    padding 0.35s ease;
}
#dynamic-island.open {
  width: 520px; max-width: 92vw; height: 48px;
  border-radius: 28px; padding: 0 10px 0 14px;
  opacity: 1; pointer-events: all;
  transform: translateX(-50%) scaleX(1) scaleY(1);
}
.island-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.75); padding: 6px 7px;
  border-radius: 10px; font-size: 15px;
  display: flex; align-items: center; flex-shrink: 0;
  transition: background 0.15s;
}
.island-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.island-btn:disabled { opacity: 0.25; cursor: default; }
.island-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.island-divider { width:1px; height:20px; background:rgba(255,255,255,0.1); margin:0 2px; flex-shrink:0; }
#island-input {
  flex:1; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12); border-radius:20px;
  color:#fff; font-size:13px; padding:5px 14px; outline:none;
  min-width:0; margin:0 6px; height:32px;
  transition: background 0.2s;
}
#island-input:focus { background:rgba(255,255,255,0.13); }
#island-input::placeholder { color:rgba(255,255,255,0.35); }
#island-close {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,0.5); padding:6px 8px;
  border-radius:10px; font-size:18px; flex-shrink:0;
}
#island-close:hover { background:rgba(255,255,255,0.1); color:#fff; }
#island-content { display:contents; opacity:0; transition:opacity 0.2s 0.25s; }
#dynamic-island.open #island-content { opacity:1; }
		</style>
	</head>

	<body>
		<div id="dynamic-island">
  <div id="island-content">
    <button class="island-btn" id="btn-back" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="island-btn" id="btn-forward" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="island-btn" id="btn-reload">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <div class="island-divider"></div>
    <input id="island-input" id="sj-address" type="text" placeholder="Search the web freely"/>
    <div class="island-divider"></div>
    <button id="island-close">&#x2715;</button>
  </div>
</div>
		<div title="Scramjet Logo" class="flex-center logo-wrapper header-center">
			<img class="logo" src="logo.png" alt="flux" />
		</div>
		<div class="flex-center desc left-margin">
		</div>

		<form id="sj-form" class="flex-center">
			<input
				id="sj-search-engine"
				value="https://www.google.com/search?q=%s"
				type="hidden"
			/>
			<input id="sj-address" type="text" placeholder="Search the web freely" />
		</form>
		<div class="desc left-margin">
			<p id="sj-error"></p>
			<pre id="sj-error-code"></pre>
		</div>
	</body>
	<script>
		const island = document.getElementById('dynamic-island');
const mainInput = document.querySelector('#sj-form #sj-address');
const islandInput = document.getElementById('island-input');
const btnBack = document.getElementById('btn-back');
const btnForward = document.getElementById('btn-forward');
const btnReload = document.getElementById('btn-reload');

let hist = [], idx = -1;

function openIsland(q) {
  islandInput.value = q;
  island.classList.add('open');
  updateNav();
  setTimeout(() => islandInput.focus(), 380);
}

function updateNav() {
  btnBack.disabled = idx <= 0;
  btnForward.disabled = idx >= hist.length - 1;
}

function navigate(q) {
  if (!q) return;
  if (idx < hist.length - 1) hist = hist.slice(0, idx + 1);
  hist.push(q); idx = hist.length - 1;
  islandInput.value = q; mainInput.value = q;
  updateNav();
}

document.getElementById('sj-form').addEventListener('submit', e => {
  e.preventDefault();
  const q = mainInput.value.trim();
  if (q) { navigate(q); openIsland(q); }
});

islandInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); navigate(islandInput.value.trim()); }
});

btnBack.addEventListener('click', () => { if (idx > 0) { idx--; islandInput.value = mainInput.value = hist[idx]; updateNav(); } });
btnForward.addEventListener('click', () => { if (idx < hist.length-1) { idx++; islandInput.value = mainInput.value = hist[idx]; updateNav(); } });
document.getElementById('island-close').addEventListener('click', () => island.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') island.classList.remove('open'); });
	</script>
</html>
