
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@160..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Readex Pro', sans-serif;
            background: transparent;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .iframe-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .gameframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
        }

        .bottom-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6px 12px;
            background: #000000;
            border-top: 1px solid #5e81ac;
            gap: 12px;
        }

        .bottom-bar a {
            color: #d8dee9;
            font-size: 1rem;
            text-decoration: none;
            transition: color 0.15s;
        }

        .bottom-bar a:hover {
            color: #eceff4;
        }

        .bottom-bar a.copied {
            color: #a3be8c;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="iframe-container">
            <iframe id="gameframe" class="gameframe" src="/404.html"></iframe>
            <div class="bottom-bar">
                <a href="games/index.html" style="margin-right: auto;"><i class="fas fa-arrow-left"></i></a>
                <a href="javascript:void(0)" id="fullscreen"><i class="fas fa-expand"></i></a>
                <a href="javascript:void(0)" id="reloadbtn"><i class="fas fa-sync-alt"></i></a>
                <a href="javascript:void(0)" id="copylink"><i class="fas fa-link"></i></a>
                <a href="javascript:void(0)" id="aboutblank"><i class="fas fa-external-link-alt"></i></a>
            </div>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[\]]/g, '\\$&');
            var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            var results = regex.exec(location.href);
            if (!results) return '';
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        var url = getUrlParameter('url');
        var loadedUrl = '';
        var useSrcdoc = false;
        var proxyFrame = null;
        var iframe = document.getElementById('gameframe');
        var frameContainer = document.querySelector('.iframe-container');
        var persistentTitle = getUrlParameter('title') || 'Flux';

        function setPageTitle() {
            document.title = persistentTitle;
            var titleElement = document.querySelector('title');
            if (titleElement) titleElement.textContent = persistentTitle;
        }

        // Keep title persistent
        setInterval(setPageTitle, 1000);

        async function initGameFrame() {
            setPageTitle();
            if (!url) return;

            loadedUrl = url;

            if (url.includes('cdn.jsdelivr.net')) {
                useSrcdoc = true;
                try {
                    var response = await fetch(url);
                    var html = await response.text();
                    iframe.srcdoc = html;
                    return;
                } catch (e) {
                    useSrcdoc = false;
                    iframe.src = '/404.html?q=' + encodeURIComponent(url);
                    return;
                }
            }

            try {
                var scramjet = new ScramjetController({
                    files: {
                        wasm: '/scram/scramjet.wasm.wasm',
                        all: '/scram/scramjet.all.js',
                        sync: '/scram/scramjet.sync.js',
                    },
                });
                scramjet.init();

                var connection = new BareMux.BareMuxConnection('/baremux/worker.js');
                var wispUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/wisp/';
                if ((await connection.getTransport()) !== '/libcurl/index.mjs') {
                    await connection.setTransport('/libcurl/index.mjs', [
                        { websocket: wispUrl },
                    ]);
                }

                proxyFrame = scramjet.createFrame();
                proxyFrame.frame.id = 'gameframe';
                proxyFrame.frame.className = 'gameframe';
                frameContainer.replaceChild(proxyFrame.frame, iframe);
                iframe = proxyFrame.frame;
                proxyFrame.go(url);
            } catch (e) {
                console.warn('Proxy failed, falling back to direct iframe:', e);
                iframe.src = url;
            }
        }

        document.getElementById('fullscreen').addEventListener('click', function () {
            var activeFrame = document.getElementById('gameframe');
            (activeFrame.requestFullscreen || activeFrame.mozRequestFullScreen || activeFrame.webkitRequestFullscreen || activeFrame.msRequestFullscreen || function(){}).call(activeFrame);
        });

        document.getElementById('reloadbtn').addEventListener('click', function () {
            if (proxyFrame && loadedUrl) {
                proxyFrame.go(loadedUrl);
            } else if (useSrcdoc && loadedUrl) {
                fetch(loadedUrl)
                    .then(function(r) { return r.text(); })
                    .then(function(html) { iframe.srcdoc = html; });
            } else {
                iframe.src = iframe.src;
            }
        });

        document.getElementById('copylink').addEventListener('click', function () {
            var copyBtn = this;
            var originalHTML = copyBtn.innerHTML;
            if (loadedUrl) {
                var fullUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(loadedUrl);
                navigator.clipboard.writeText(fullUrl).then(function () {
                    copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                    copyBtn.classList.add('copied');
                    setTimeout(function () { copyBtn.innerHTML = originalHTML; copyBtn.classList.remove('copied'); }, 2000);
                }).catch(function () {
                    var ta = document.createElement('textarea');
                    ta.value = fullUrl;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                    copyBtn.classList.add('copied');
                    setTimeout(function () { copyBtn.innerHTML = originalHTML; copyBtn.classList.remove('copied'); }, 2000);
                });
            } else {
                copyBtn.innerHTML = '<i class="fas fa-times"></i>';
                copyBtn.style.color = '#bf616a';
                setTimeout(function () { copyBtn.innerHTML = originalHTML; copyBtn.style.color = ''; }, 1500);
            }
        });

        initGameFrame();

        // about:blank popup
        document.getElementById('aboutblank').addEventListener('click', function () {
            var win = window.open();
            if (!win || win.closed) throw new Error('blocked');
            var url = window.location.href;
            var iframe = win.document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.position = 'fixed';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.src = url;
            win.document.body.style.margin = '0';
            win.document.body.appendChild(iframe);
            win.document.title = 'New Tab';
        });
    </script>
    <script>
        // Register service worker for Scramjet proxying
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
        }
    </script>
    <script src="/js/file.js" defer></script>
</body>
</html>
