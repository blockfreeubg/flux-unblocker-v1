			body {
				height: 100%;
				margin: 0;
				overflow: hidden;
			}

			body {
				display: flex;
				flex-direction: column;
				background: #111;
			}

			.island-container {
				flex-shrink: 0;
				padding: 16px 0;
				background: rgba(0, 0, 0, 0.82);
				backdrop-filter: blur(10px);
			}

			.app-stage {
				flex: 1;
				min-height: 0;
				position: relative;
			}

			.app-picker {
				max-width: 1100px;
				width: 100%;
				margin: 0 auto;
				padding: 18px 22px 14px;
				box-sizing: border-box;
				height: 100%;
				overflow: auto;
			}

			.apps-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
				gap: 10px;
			}

			.app-card {
				background: rgba(0, 0, 0, 0.72);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 12px;
				padding: 10px;
				cursor: pointer;
				color: #fff;
				text-align: left;
				transition: border-color 0.15s ease, transform 0.15s ease;
			}

			.app-card:hover {
				border-color: rgba(255, 255, 255, 0.35);
				transform: translateY(-2px);
			}

			.app-card.active {
				border-color: rgba(255, 255, 255, 0.7);
			}

			.app-card img {
				width: 100%;
				aspect-ratio: 16 / 9;
				object-fit: cover;
				display: block;
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.08);
			}

			.app-card strong {
				display: block;
				margin-top: 8px;
				font-size: 0.92rem;
			}

			.app-card span {
				display: block;
				margin-top: 2px;
				font-size: 0.78rem;
				color: rgba(255, 255, 255, 0.75);
			}

			.embedded-area {
				position: absolute;
				inset: 0;
			}

			.embedded-area[hidden] {
				display: none;
			}

			#app-frame {
				width: 100%;
				height: 100%;
				border: 0;
				background: #0e0e0e;
				display: block;
			}

			.loading-overlay {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				gap: 12px;
				background: rgba(8, 8, 8, 0.9);
				backdrop-filter: blur(6px);
				z-index: 3000;
				color: #fff;
				font-size: 0.95rem;
			}

			.loading-overlay.active {
				display: flex;
			}

			.loader-ring {
				width: 42px;
				height: 42px;
				border-radius: 50%;
				border: 3px solid rgba(255, 255, 255, 0.25);
				border-top-color: #fff;
				animation: spin 0.75s linear infinite;
			}

			.loading-seconds {
				font-size: 0.85rem;
				color: rgba(255, 255, 255, 0.75);
			}

			.loading-tip {
				max-width: 360px;
				text-align: center;
				font-size: 0.82rem;
				color: rgba(255, 255, 255, 0.82);
				padding: 0 14px;
				line-height: 1.4;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@keyframes move {
    100% {
        transform: translate3d(0, 0, 1px) rotate(360deg);
    }
}

				{ key: "tiktok", name: "Tiktok", site: "https://tiktok.com", label: "tiktok.com" }
			];

			const loadingText = document.getElementById("loading-text");
			const loadingSeconds = document.getElementById("loading-seconds");

				"Tip: if a site fails, click it again from the app list."

			let activeTimer;
			let activeTipTimer;

				return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
			};

			const stopLoading = () => {
				if (activeTimer) clearInterval(activeTimer);
				if (activeTipTimer) clearInterval(activeTipTimer);
				activeTimer = undefined;
				activeTipTimer = undefined;
				loadingOverlay.classList.remove("active");
				loadingOverlay.setAttribute("aria-hidden", "true");
			};

			const startLoading = (name) => {
				stopLoading();
				loadingText.textContent = `Opening ${name}...`;
